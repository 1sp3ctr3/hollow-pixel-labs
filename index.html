<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ditto Snake</title>

<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.panel{
    background:#111827;
    padding:20px;
    border-radius:20px;
    text-align:center;
    width:520px;
}

canvas{
    background:#020617;
    border:3px solid #38bdf8;
    border-radius:12px;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    background:#38bdf8;
    border:none;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.characters{
    display:flex;
    gap:10px;
    margin-top:15px;
    flex-wrap:wrap;
    justify-content:center;
}

.character{
    background:#1e293b;
    padding:10px;
    border-radius:12px;
    width:100px;
}

.locked{
    opacity:0.4;
}

.selected{
    border:2px solid #38bdf8;
}

.small{
    font-size:12px;
}
</style>
</head>
<body>

<div class="panel">

<div class="top">
<h2>Ditto Snake</h2>
<button onclick="restartGame()">Reiniciar</button>
</div>

<canvas id="game" width="400" height="400"></canvas>

<h3>Puntos: <span id="score">0</span></h3>

<p>Presiona F para usar habilidad</p>

<div class="characters">

<div class="character selected" id="dittoCard">
<h3>🟣 Ditto</h3>
<p class="small">Invencible 3s</p>
<button onclick="selectCharacter('ditto')">Usar</button>
</div>

<div class="character locked" id="knightCard">
<h3>🛡 Knight</h3>
<p class="small">20 puntos</p>
<button onclick="unlockCharacter('knight',20)">Comprar</button>
</div>

<div class="character locked" id="endermanCard">
<h3>👾 Enderman</h3>
<p class="small">40 puntos</p>
<button onclick="unlockCharacter('enderman',40)">Comprar</button>
</div>

<div class="character locked" id="impostorCard">
<h3>🔴 Impostor</h3>
<p class="small">60 puntos</p>
<button onclick="unlockCharacter('impostor',60)">Comprar</button>
</div>

</div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;

let snake = [{x:200,y:200}];

let food = randomFood();

let direction = "RIGHT";

let score = 0;

let currentCharacter = "ditto";

let unlocked = {
ditto:true,
knight:false,
enderman:false,
impostor:false
};

let invincible = false;
let wallPasses = 5;

document.addEventListener("keydown", changeDirection);
document.addEventListener("keydown", abilityKey);

function randomFood(){
return{
x:Math.floor(Math.random()*20)*box,
y:Math.floor(Math.random()*20)*box
};
}

function changeDirection(e){

if(e.key==="ArrowUp" && direction!=="DOWN"){
direction="UP";
}
else if(e.key==="ArrowDown" && direction!=="UP"){
direction="DOWN";
}
else if(e.key==="ArrowLeft" && direction!=="RIGHT"){
direction="LEFT";
}
else if(e.key==="ArrowRight" && direction!=="LEFT"){
direction="RIGHT";
}

}

function abilityKey(e){

if(e.key.toLowerCase()!=="f") return;

if(currentCharacter==="ditto"){

invincible=true;

setTimeout(()=>{
invincible=false;
},3000);

}

if(currentCharacter==="enderman"){

snake[0].x = Math.floor(Math.random()*20)*box;
snake[0].y = Math.floor(Math.random()*20)*box;

}

if(currentCharacter==="impostor"){

if(
Math.abs(snake[0].x-food.x)<=60 &&
Math.abs(snake[0].y-food.y)<=60
){
score++;
document.getElementById("score").innerText=score;
food=randomFood();
}

}

}

function draw(){

ctx.fillStyle="#020617";
ctx.fillRect(0,0,400,400);

for(let i=0;i<snake.length;i++){

ctx.fillStyle=i===0 ? "#38bdf8" : "#7dd3fc";

if(currentCharacter==="ditto"){
ctx.fillStyle=i===0 ? "#c084fc" : "#e9d5ff";
}

if(currentCharacter==="knight"){
ctx.fillStyle=i===0 ? "#94a3b8" : "#cbd5e1";
}

if(currentCharacter==="enderman"){
ctx.fillStyle=i===0 ? "#a855f7" : "#d8b4fe";
}

if(currentCharacter==="impostor"){
ctx.fillStyle=i===0 ? "#ef4444" : "#fca5a5";
}

ctx.fillRect(snake[i].x,snake[i].y,box,box);

}

ctx.fillStyle="#22c55e";
ctx.fillRect(food.x,food.y,box,box);
