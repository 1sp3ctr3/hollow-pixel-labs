<script>

/* ── Comprar juego ── */
function comprarJuego(juego){
  const correo = 'matthspectre@gmail.com';
  const asunto = encodeURIComponent('Compra de juego');
  const mensaje = encodeURIComponent('Hola, quiero comprar el juego: ' + juego);
  window.location.href = `mailto:${correo}?subject=${asunto}&body=${mensaje}`;
}

/* ── Modal ── */
function abrirJuego(){
  document.getElementById('modalJuego').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function cerrarJuego(){
  document.getElementById('modalJuego').style.display = 'none';
  document.body.style.overflow = '';
  clearInterval(loopId);
  jugando = false;
}

/* ── Snake con personajes ── */
const TILE = 20;

let canvas, ctx, snake, dir, nextDir, food;
let jugando, loopId, puntos, record = 0;

let personajeActual = 0;

const DESBLOQUEOS = [0, 20, 50, 100];

const NOMBRES = [
  'Ditto',
  'Knight',
  'Enderman',
  'Impostor'
];

const EMOJIS_CUERPO = [
  {head:'#b39ddb', body1:'#c77dff', body2:'#9b5de5', body3:'#7b2d8b'},
  {head:'#2a2a2a', body1:'#444', body2:'#222', body3:'#111'},
  {head:'#1a1a1a', body1:'#111', body2:'#0a0a0a', body3:'#050505'},
  {head:'#e03c3c', body1:'#ff6b6b', body2:'#cc2222', body3:'#991111'},
];

/* ── PODERES ── */

let dittoInvencible = false;
let knightPasadas = 5;
let impostorComidas = 7;

function seleccionarPersonaje(i){

  if(record < DESBLOQUEOS[i]){
    document.getElementById('mensajeJuego').textContent =
    `🔒 Necesitas ${DESBLOQUEOS[i]} pts de récord`;
    return;
  }

  personajeActual = i;

  document.querySelectorAll('[id^="char"]').forEach((el, idx) => {

    el.style.border =
    idx === i
    ? '2px solid #7ab8ff'
    : '2px solid #444';

    el.style.background =
    idx === i
    ? 'rgba(122,184,255,0.2)'
    : 'rgba(0,0,0,0.3)';
  });

  document.getElementById('mensajeJuego').textContent =
  `Jugando como: ${NOMBRES[i]}`;
}

function actualizarPersonajes(){

  const emojis = ['🟣','🪲','🖤','👻'];

  document.querySelectorAll('[id^="char"]').forEach((el, i) => {

    const desbloqueado = record >= DESBLOQUEOS[i];

    el.style.opacity = desbloqueado ? '1' : '0.5';

    el.querySelector('div:nth-child(2)').textContent =
    desbloqueado ? emojis[i] : '🔒';

    el.style.border =
    i === personajeActual
    ? '2px solid #7ab8ff'
    : (desbloqueado ? '2px solid #555' : '2px solid #444');

  });
}

function iniciarJuego(){

  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');

  const cols = Math.floor(canvas.width / TILE);
  const rows = Math.floor(canvas.height / TILE);

  snake = [
    {x:10, y:8},
    {x:9, y:8},
    {x:8, y:8}
  ];

  dir = {x:1, y:0};
  nextDir = {x:1, y:0};

  puntos = 0;
  jugando = true;

  /* RESET PODERES */

  dittoInvencible = false;
  knightPasadas = 5;
  impostorComidas = 7;

  document.getElementById('score').textContent = 0;
  document.getElementById('mensajeJuego').textContent = '';

  spawnFood(cols, rows);

  clearInterval(loopId);

  loopId = setInterval(() => tick(cols, rows), 120);
}

function spawnFood(cols, rows){

  do {

    food = {
      x: Math.floor(Math.random() * cols),
      y: Math.floor(Math.random() * rows)
    };

  } while(
    snake.some(s => s.x === food.x && s.y === food.y)
  );
}

function cambiarDir(dx, dy){

  if(!jugando) return;

  if(dx === -nextDir.x && dy === -nextDir.y) return;

  nextDir = {x:dx, y:dy};
}

document.addEventListener('keydown', e => {

  const map = {
    ArrowUp: [0,-1],
    ArrowDown: [0,1],
    ArrowLeft: [-1,0],
    ArrowRight:[1,0]
  };

  if(map[e.key]){

    e.preventDefault();

    cambiarDir(...map[e.key]);
  }
});

/* ───────────────────────── */
/* TICK */
/* ───────────────────────── */

function tick(cols, rows){

  dir = nextDir;

  let head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  /* ── KNIGHT ── */

  if(personajeActual === 1){

    if(head.x < 0){

      if(knightPasadas > 0){
        head.x = cols - 1;
        knightPasadas--;
      } else return gameOver();
    }

    if(head.x >= cols){

      if(knightPasadas > 0){
        head.x = 0;
        knightPasadas--;
      } else return gameOver();
    }

    if(head.y < 0){

      if(knightPasadas > 0){
        head.y = rows - 1;
        knightPasadas--;
      } else return gameOver();
    }

    if(head.y >= rows){

      if(knightPasadas > 0){
        head.y = 0;
        knightPasadas--;
      } else return gameOver();
    }

  } else {

    if(
      head.x < 0 ||
      head.x >= cols ||
      head.y < 0 ||
      head.y >= rows
    ){

      /* ── DITTO ── */

      if(personajeActual === 0 && !dittoInvencible){

        dittoInvencible = true;

        document.getElementById('mensajeJuego').textContent =
        '🟣 Ditto activó invencibilidad';

        setTimeout(() => {
          dittoInvencible = false;
        }, 3000);

        return;
      }

      return gameOver();
    }
  }

  /* ── ENDERMAN ── */

  if(personajeActual === 2){

    const peligro = snake.some(s =>
      Math.abs(s.x - head.x) <= 1 &&
      Math.abs(s.y - head.y) <= 1
    );

    if(peligro){

      head.x = food.x;
      head.y = food.y;

      document.getElementById('mensajeJuego').textContent =
      '🖤 Enderman se teletransportó';
    }
  }

  /* choque cuerpo */

  if(
    snake.some(s =>
      s.x === head.x &&
      s.y === head.y
    )
  ){
    return gameOver();
  }

  snake.unshift(head);

  /* ── IMPOSTOR ── */

  let comer = false;

  if(head.x === food.x && head.y === food.y){
    comer = true;
  }

  if(
    personajeActual === 3 &&
    impostorComidas > 0
  ){

    const distancia =
      Math.abs(head.x - food.x) +
      Math.abs(head.y - food.y);

    if(distancia <= 3){

      comer = true;

      impostorComidas--;

      document.getElementById('mensajeJuego').textContent =
      `👻 Impostor usó comer lejos (${impostorComidas})`;
    }
  }

  if(comer){

    puntos += 2;

    document.getElementById('score').textContent = puntos;

    if(puntos > record){

      record = puntos;

      document.getElementById('record').textContent = record;

      actualizarPersonajes();
    }

    spawnFood(cols, rows);

  } else {

    snake.pop();
  }

  dibujar();
}

/* ── DIBUJAR CABEZA ── */

function dibujarCabeza(x, y){

  const cx = x + TILE/2;
  const cy = y + TILE/2;
  const r = TILE/2 - 1;

  const p = personajeActual;

  if(p === 0){

    ctx.fillStyle = '#b39ddb';

    ctx.beginPath();
    ctx.ellipse(cx, cy+1, r, r-1, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#1a1a2e';

    ctx.beginPath();
    ctx.ellipse(cx-3, cy-1, 2, 2.5, -0.2, 0, Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.ellipse(cx+3, cy-1, 2, 2.5, 0.2, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = 'white';

    ctx.beginPath();
    ctx.ellipse(cx-3.5, cy-2, 0.8, 0.8, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.ellipse(cx+2.5, cy-2, 0.8, 0.8, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 1.2;

    ctx.beginPath();
    ctx.moveTo(cx-3, cy+4);
    ctx.quadraticCurveTo(cx, cy+7, cx+3, cy+4);
    ctx.stroke();
  }
}

function dibujar(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle = 'rgba(122,184,255,0.04)';
  ctx.lineWidth = 0.5;

  for(let x=0; x<canvas.width; x+=TILE){

    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,canvas.height);
    ctx.stroke();
  }

  for(let y=0; y<canvas.height; y+=TILE){

    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();
  }

  ctx.font = `${TILE+2}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.fillText(
    '🍬',
    food.x*TILE + TILE/2,
    food.y*TILE + TILE/2
  );

  const c = EMOJIS_CUERPO[personajeActual];

  snake.forEach((seg, i) => {

    const x = seg.x * TILE;
    const y = seg.y * TILE;

    if(i === 0){

      dibujarCabeza(x, y);

    } else {

      const grad = ctx.createLinearGradient(
        x, y,
        x+TILE, y+TILE
      );

      grad.addColorStop(0, c.body1);
      grad.addColorStop(0.5, c.body2);
      grad.addColorStop(1, c.body3);

      ctx.fillStyle = grad;

      ctx.beginPath();
      ctx.roundRect(x+2, y+2, TILE-4, TILE-4, 4);
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.18)';

      ctx.beginPath();
      ctx.roundRect(x+3, y+3, TILE-10, 4, 2);
      ctx.fill();
    }
  });
}

function gameOver(){

  clearInterval(loopId);

  jugando = false;

  dibujar();

  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.fillText(
    '¡Game Over!',
    canvas.width/2,
    canvas.height/2 - 18
  );

  ctx.font = '16px Arial';

  ctx.fillStyle = '#7ab8ff';

  ctx.fillText(
    `Puntos: ${puntos}`,
    canvas.width/2,
    canvas.height/2 + 18
  );

  document.getElementById('mensajeJuego').textContent =
  '¡Presiona Jugar para intentarlo de nuevo!';

  actualizarPersonajes();
}

</script>
